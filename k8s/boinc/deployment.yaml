apiVersion: apps/v1
kind: Deployment
metadata:
  name: boinc-site
  namespace: boinc
  labels:
    app.kubernetes.io/name: boinc-site
    app.kubernetes.io/part-of: boinc
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: boinc-site
  template:
    metadata:
      labels:
        app.kubernetes.io/name: boinc-site
        app.kubernetes.io/part-of: boinc
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: nginx
          image: beecodersregistry.azurecr.io/boinc-site:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
