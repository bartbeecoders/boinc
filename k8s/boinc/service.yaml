# Public-facing Service. Cloudflare Tunnel points at <node>:32087 and
# forwards traffic from https://boinc.hideterms.com.
#
# Why NodePort instead of an Ingress? Cloudflare Tunnel does TLS termination
# + DNS for us, so we just need a stable in-cluster port to point cloudflared
# at. NodePort is the simplest way to expose that on a single-node K3s.
apiVersion: v1
kind: Service
metadata:
  name: boinc-site
  namespace: boinc
  labels:
    app.kubernetes.io/name: boinc-site
    app.kubernetes.io/part-of: boinc
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: boinc-site
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 32087
      protocol: TCP
