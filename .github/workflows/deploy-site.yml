name: Deploy site

# Deploys site/ to Cloudflare Pages whenever it changes on main.
# Requires two repository secrets (see Vibecoding/deploy.md for setup):
#   CLOUDFLARE_API_TOKEN   — API token with Pages:Edit
#   CLOUDFLARE_ACCOUNT_ID  — the Cloudflare account id

on:
  push:
    branches: [main]
    paths: ["site/**"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Build
        run: npm ci && npm run build
        working-directory: site
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=boinc-portal
