# cargo-deny configuration (https://embarkstudios.github.io/cargo-deny/)
# Run locally with: cargo deny check

[graph]
all-features = true

[advisories]
yanked = "deny"
ignore = [
    # GTK3 bindings are unmaintained upstream but required by tray-icon on
    # Linux. Revisit when tray-icon gains a GTK4/ksni backend.
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    # Unmaintained transitive deps pinned by floem 0.2 / tray-icon; nothing
    # we can bump directly. Revisit on the next floem upgrade.
    "RUSTSEC-2024-0370", # proc-macro-error
    "RUSTSEC-2024-0436", # paste
    "RUSTSEC-2026-0192",
    "RUSTSEC-2026-0206",
    # DoS-class parser vulnerabilities (quadratic HTML attribute check,
    # quick-xml NsReader allocation) in floem's asset-parsing tree. These
    # parse our own bundled assets, not untrusted input. Revisit on the
    # next floem upgrade.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    # Unmaintained transitive deps of vtracer 0.6 (visioncortex): image 0.23
    # pulls adler via miniz_oxide/tiff; the binary always depends on clap 2
    # which pulls ansi_term + atty. We only use the library API and cannot
    # bump these until vtracer drops clap 2 / upgrades image. Revisit on the
    # next vtracer release.
    "RUSTSEC-2025-0056", # adler (via image 0.23 → tiff → miniz_oxide)
    "RUSTSEC-2021-0139", # ansi_term (via clap 2)
    "RUSTSEC-2024-0375", # atty (via clap 2)
]

[licenses]
allow = [
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
