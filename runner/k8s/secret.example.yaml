# Copy to secret.yaml (gitignored pattern — do not commit real tokens).
# Create with:
#   kubectl -n gha-runner create secret generic gha-runner \
#     --from-literal=github_token=ghp_... \
#     --dry-run=client -o yaml > secret.yaml
#
# Or fill this file and: kubectl apply -f secret.yaml
#
# Token requirements:
#   - Classic PAT: `repo` (private) or public_repo is NOT enough for runner
#     registration — need admin rights to create registration tokens.
#     Prefer fine-grained: Repository permissions → Administration: Read and write.
#   - The container fetches a short-lived registration token at startup.
apiVersion: v1
kind: Secret
metadata:
  name: gha-runner
  namespace: gha-runner
type: Opaque
stringData:
  # Fine-grained or classic PAT used only to mint registration tokens.
  github_token: "REPLACE_ME"
