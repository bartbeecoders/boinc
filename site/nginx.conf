# Boinc portal nginx config.
#
# Static SPA from /usr/share/nginx/html. Cloudflare Tunnel terminates TLS
# and forwards plain HTTP to the NodePort, so we listen on :80 only.

# Cache for the app-version proxy below: clients (the app's startup update
# check) hit GitHub at most once per 10 minutes, and a cached copy survives
# GitHub outages/rate limits.
proxy_cache_path /var/cache/nginx/appver levels=1 keys_zone=appver:1m max_size=10m inactive=1h;

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Probe endpoint for k8s liveness/readiness.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Latest-release manifest for the app's update check: a cached proxy of
    # the GitHub releases API, so GitHub releases stay the single source of
    # truth and shipping a version needs no site redeploy.
    location = /api/app-version {
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        proxy_pass https://api.github.com/repos/bartbeecoders/boinc/releases/latest;
        proxy_set_header Host api.github.com;
        proxy_set_header User-Agent boinc-portal;
        proxy_set_header Accept "application/vnd.github+json";
        proxy_ssl_server_name on;
        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
        proxy_cache appver;
        proxy_cache_valid 200 10m;
        proxy_cache_use_stale error timeout updating http_403 http_429;
        add_header Cache-Control "public, max-age=300";
    }

    # Generated bundles are content-hashed; cache them aggressively.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
