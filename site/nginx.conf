# Boinc portal nginx config.
#
# Static SPA from /usr/share/nginx/html. Cloudflare Tunnel terminates TLS
# and forwards plain HTTP to the NodePort, so we listen on :80 only.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Probe endpoint for k8s liveness/readiness.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Generated bundles are content-hashed; cache them aggressively.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
